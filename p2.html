<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 2</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#000;
font-family:'Marcellus',serif;
overflow:hidden;
}
.image-container{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}
.image-container img{
max-width:100%;
max-height:100%;
object-fit:contain;
}
.nav{
position:fixed;
bottom:25px;
left:0;
width:100%;
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
padding:0 40px;
}
.nav-center{
justify-self:center;
color:rgba(255,230,180,0.4);
font-size:0.9rem;
letter-spacing:0.4em;
}
.nav-center span{
cursor:pointer;
transition:0.3s;
}
.nav-center span:hover{
color:#ffe9b8;
}
.nav-btn{
justify-self:start;
color:rgba(255,230,180,0.5);
font-size:1rem;
letter-spacing:0.3em;
cursor:pointer;
transition:0.3s;
}
.nav-btn.end{
justify-self:end;
}
.nav-btn:hover{
color:#ffe9b8;
}
</style>
</head>
<body>
<div class="image-container">
  <img src="p2_photo1.jpg" alt="photo page 2">
</div>
<div class="nav">
  <!-- BACK -->
  <div class="nav-btn" onclick="window.location.href='p1.html'">back</div>
  <!-- NUMÉROS -->
  <div class="nav-center">
    <span onclick="window.location.href='p1.html'">1</span> ·
    <span onclick="window.location.href='p2.html'">2</span> ·
    <span onclick="window.location.href='p3.html'">3</span> ·
    <span onclick="window.location.href='p4.html'">4</span>
  </div>
  <!-- NEXT -->
  <div class="nav-btn end" onclick="window.location.href='p3.html'">next</div>
</div>
</body>
</html>
